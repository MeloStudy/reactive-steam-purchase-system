info:
  name: Get Cart History
  type: http
  seq: 2

http:
  method: GET
  url: "{{store_service_url}}/cart/history"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK - Returns all carts
    request:
      url: "{{store_service_url}}/cart/history"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: transfer-encoding
          value: chunked
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "cartId": "CART-001",
              "userId": "USER-001",
              "items": [
                {
                  "gameId": "GAME-001"
                }
              ],
              "updatedAt": "2026-05-21T15:32:34.789",
              "status": "CLOSED"
            },
            {
              "cartId": "6a0f293837edb2455b8fe1be",
              "userId": "USER-001",
              "items": [
                {
                  "gameId": "GAME-003"
                },
                {
                  "gameId": "GAME-001"
                },
                {
                  "gameId": "GAME-007"
                }
              ],
              "updatedAt": "2026-05-21T16:00:12.036",
