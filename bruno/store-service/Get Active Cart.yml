info:
  name: Get Active Cart
  type: http
  seq: 1

http:
  method: GET
  url: "{{store_service_url}}/cart"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK - Empty cart (DRAFT)
    request:
      url: "{{store_service_url}}/cart"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: content-length
          value: "130"
      body:
        type: json
        data: |-
          {
            "cart_id": "NOT-DEFINED",
            "user_id": "USER-001",
            "items": [],
            "total": 0.0,
            "checkout_allowed": false,
            "status": "DRAFT",
            "validations": null
          }
  - name: OK - Cart with items
    request:
      url: "{{store_service_url}}/cart"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: content-length
          value: "490"
      body:
        type: json
        data: |-
          {
            "cart_id": "6a0f293837edb2455b8fe1be",
            "user_id": "USER-001",
            "items": [
              {
                "id": "GAME-007",
                "original_price": 80.0,
                "discount": 0.0,
                "final_price": 80.0,
                "status": "OWNED",
                "disclaimer": "Already owned"
              },
              {
                "id": "GAME-001",
                "original_price": 60.0,
                "discount": 6.0,
                "final_price": 54.0,
                "status": "OK",
                "disclaimer": null
              },
              {
                "id": "GAME-003",
                "original_price": 20.0,
                "discount": 5.0,
                "final_price": 15.0,
                "status": "OK",
                "disclaimer": null
              }
            ],
            "total": 149.0,
            "checkout_allowed": true,
            "status": "OK",
            "validations": [
              "Remove owned games"
            ]
          }
