info:
  name: Remove Item from Cart
  type: http
  seq: 4

http:
  method: DELETE
  url: "{{store_service_url}}/cart/items/:itemId"
  params:
    - name: itemId
      value: GAME-113
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK - Item removed from cart
    request:
      url: "{{store_service_url}}/cart/items/:itemId"
      method: DELETE
      params:
        - name: itemId
          value: GAME-003
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: content-length
          value: "167"
      body:
        type: json
        data: |-
          {
            "cartId": "6a0f293837edb2455b8fe1be",
            "userId": "USER-001",
            "items": [
              {
                "gameId": "GAME-001"
              },
              {
                "gameId": "GAME-007"
              }
            ],
            "updatedAt": "2026-05-21T16:02:22.539",
            "status": "ACTIVE"
          }
  - name: OK - Game not in cart (returns cart unchanged)
    request:
      url: "{{store_service_url}}/cart/items/:itemId"
      method: DELETE
      params:
        - name: itemId
          value: GAME-113
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: content-length
          value: "167"
      body:
        type: json
        data: |-
          {
            "cartId": "6a0f293837edb2455b8fe1be",
            "userId": "USER-001",
            "items": [
              {
                "gameId": "GAME-001"
              },
              {
                "gameId": "GAME-007"
              }
            ],
            "updatedAt": "2026-05-21T16:02:22.539",
            "status": "ACTIVE"
          }
  - name: OK - No active cart (returns DRAFT)
    request:
      url: "{{store_service_url}}/cart/items/:itemId"
      method: DELETE
      params:
        - name: itemId
          value: GAME-113
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
        - name: content-length
          value: "115"
      body:
        type: json
        data: |-
          {
            "cartId": "NOT-DEFINED",
            "userId": "USER-001",
            "items": [],
            "updatedAt": "2026-05-21T16:04:39.71313641",
            "status": "DRAFT"
          }
