services:
  catalogue-service:
    build:
      context: ./catalogue-service
      dockerfile: Dockerfile
    container_name: catalogue-service
    ports:
      - "5000:5000"
    volumes:
      - ./catalogue-service/instance:/app/instance
    networks:
      - purchase-system
    restart: unless-stopped

  store-service:
    build:
      context: ./store-service
      dockerfile: Dockerfile
    container_name: store-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://cart_db:27017/cart_db
      - CATALOGUE_SERVICE_URL=http://catalogue-service:5000
    depends_on:
      - cart_db
      - catalogue-service
    networks:
      - purchase-system
    restart: unless-stopped

  cart_db:
      image: mongo:7.0
      container_name: cart_db
      ports:
        - "27017:27017"
      networks:
        - purchase-system

networks:
  purchase-system:
    driver: bridge